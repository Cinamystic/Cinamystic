<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" fill="none">
  <defs>
    <linearGradient id="cmBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fcfff"/>
      <stop offset="45%" stop-color="#3a8fc0"/>
      <stop offset="100%" stop-color="#1a4d70"/>
    </linearGradient>
    <radialGradient id="cmCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e6f4ff"/>
      <stop offset="60%" stop-color="#3a8fc0"/>
      <stop offset="100%" stop-color="#1a4d70" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(20,20)" filter="url(#glow)">
    <circle cx="50" cy="50" r="48" fill="none" stroke="url(#cmBlue)" stroke-width="2.5"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#3a8fc0" stroke-width="1" stroke-dasharray="2 6" opacity="0.6"/>
    <path d="M74 32 A30 30 0 1 0 74 68" stroke="url(#cmBlue)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <circle cx="50" cy="50" r="9" fill="url(#cmCore)"/>
    <circle cx="50" cy="50" r="2.5" fill="#e6f4ff"/>
    <g fill="#7fcfff">
      <circle cx="50" cy="6" r="1.6"/>
      <circle cx="90" cy="28" r="1.2"/>
      <circle cx="92" cy="70" r="1.8"/>
      <circle cx="50" cy="94" r="1.2"/>
      <circle cx="10" cy="70" r="1.6"/>
      <circle cx="8" cy="28" r="1.2"/>
    </g>
  </g>

  <g transform="translate(140,0)" font-family="Orbitron, 'Segoe UI', sans-serif">
    <text x="0" y="78" font-size="46" font-weight="700" letter-spacing="4" fill="url(#cmBlue)">CINAMYSTIC</text>
    <text x="2" y="102" font-size="10" font-weight="500" letter-spacing="6.5" fill="#3a8fc0" opacity="0.9">CINEMATIC · COMMERCIAL · AI</text>
  </g>
</svg>
